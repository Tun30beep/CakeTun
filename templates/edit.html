<h2>Edit Cake</h2>
<form method="POST">
    Name: <input name="name" value="{{ cake.name }}"><br>
    Price: <input name="price" value="{{ cake.price }}"><br>
    Image: <input name="image" value="{{ cake.image }}"><br>
    Stock: <input name="stock" value="{{ cake.stock }}"><br>
    <button>Update</button>
</form>
